global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: stone-mill-dem
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "stone-mill-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["stone-mill-backend:9091"]
        labels:
          service: stone-mill-demo
          module: backend-cpp
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:9363"]
        labels:
          service: stone-mill-demo
          module: storage

  - job_name: "mosquitto"
    static_configs:
      - targets: ["mosquitto:9234"]
        labels:
          service: stone-mill-demo
          module: mqtt-broker
