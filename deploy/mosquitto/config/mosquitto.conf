# Stone Mill DEM - Mosquitto MQTT Broker
listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# 限流与连接保护
max_connections 256
max_queued_messages 10000
message_size_limit 262144

connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
